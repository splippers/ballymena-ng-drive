<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ballymena — Alignment Diagnostic</title>
<style>
  body { background:#111; color:#fff; font-family:monospace; margin:20px; }
  #container { position:relative; display:inline-block; max-width:100%; }
  #sat { max-width:100%; height:auto; image-rendering:auto; }
  #overlay { position:absolute; top:0; left:0; width:100%; height:100%; }
  #info { margin-top:10px; font-size:12px; }
  .coord { color:#888; }
</style>
</head>
<body>
<h3>Alignment Diagnostic</h3>
<div id="container">
  <img id="sat" src="satellite.png" crossorigin="anonymous">
  <canvas id="overlay"></canvas>
</div>
<div id="info">Loading...</div>

<script>
var img = document.getElementById('sat');
var canvas = document.getElementById('overlay');
var ctx = canvas.getContext('2d');
var info = document.getElementById('info');

img.onload = function() {
  var iw = img.naturalWidth, ih = img.naturalHeight;
  canvas.width = iw;
  canvas.height = ih;
  canvas.style.width = '100%';
  canvas.style.height = '100%';

  // Sat crop: 2891x2916 out of 4096x4096, placed at bottom-left of image
  var uMax = 2891 / 4096;
  var vMax = 2916 / 4096;

  // BBOX in local metres
  var bx0 = -961.0, bx1 = 1025.0;
  var bz0 = -891.0, bz1 = 1113.0;

  // Fetch map data
  fetch('map3d.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      ctx.clearRect(0, 0, iw, ih);

      // Draw roads
      ctx.strokeStyle = 'rgba(255,100,100,0.3)';
      ctx.lineWidth = 1;
      data.roads.forEach(function(pts) {
        ctx.beginPath();
        pts.forEach(function(p, i) {
          var uf = (p[0] - bx0) / (bx1 - bx0);
          var vf = (p[1] - bz0) / (bz1 - bz0);
          var px = uf * uMax * iw;
          var py = (1 - vf * vMax) * ih;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.stroke();
      });

      // Draw buildings as dots
      var total = data.buildings.length;
      data.buildings.forEach(function(b, i) {
        var uf = (b.x - bx0) / (bx1 - bx0);
        var vf = (b.z - bz0) / (bz1 - bz0);
        var px = uf * uMax * iw;
        var py = (1 - vf * vMax) * ih;
        if (px >= 0 && px <= iw && py >= 0 && py <= ih) {
          ctx.fillStyle = '#ff4444';
          ctx.fillRect(px - 1, py - 1, 3, 3);
        }
      });

      // Draw BBOX outline
      ctx.strokeStyle = '#00ff00';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.strokeRect(0, (1 - vMax) * ih, uMax * iw, vMax * ih);
      ctx.setLineDash([]);

      // Draw terrain bounds outline
      var t = data.terrain;
      var uf0 = (t.x0 - bx0) / (bx1 - bx0);
      var uf1 = (t.x1 - bx0) / (bx1 - bx0);
      var vf0 = (t.z0 - bz0) / (bz1 - bz0);
      var vf1 = (t.z1 - bz0) / (bz1 - bz0);
      ctx.strokeStyle = 'rgba(255,255,0,0.5)';
      ctx.strokeRect(uf0 * uMax * iw, (1 - vf1 * vMax) * ih, (uf1-uf0) * uMax * iw, (vf1-vf0) * vMax * ih);

      // Count visible
      info.textContent = total + ' buildings · ' + data.roads.length + ' roads · BBOX=green dashed · terrain=yellow';
    });
};
</script>
</body>
</html>
