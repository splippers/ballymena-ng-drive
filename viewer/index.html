<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ballymena NG — Photoreal 3D</title>
<style>
  body { margin:0; overflow:hidden; background:#1a1a2e; }
  #loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:18px; z-index:20; background:rgba(0,0,0,0.7); padding:20px 40px; border-radius:12px; }
  #info { position:absolute; top:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; padding:10px 24px; border-radius:12px; font-size:14px; z-index:10; text-align:center; pointer-events:none; backdrop-filter:blur(8px); }
  #stats { position:absolute; bottom:20px; left:20px; color:rgba(255,255,255,0.5); font-size:11px; z-index:10; pointer-events:none; }
  #hint { position:absolute; bottom:20px; right:20px; color:rgba(255,255,255,0.4); font-size:11px; z-index:10; text-align:right; line-height:1.8; pointer-events:none; }
</style>
</head>
<body>
<div id="loading">Loading photoreal Ballymena...</div>
<div id="info">Ballymena Town Centre — Photoreal v4.2</div>
<div id="stats"></div>
<div id="hint">Drag to orbit · Scroll to zoom · Right-drag to pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

var loading = document.getElementById('loading');
var statsEl = document.getElementById('stats');

function getTerrainHeight(x, z, t) {
  if (!t.grid || !t.grid.length) return 0;
  var ci = (x - t.x0) / (t.x1 - t.x0) * (t.cols - 1);
  var ri = (z - t.z0) / (t.z1 - t.z0) * (t.rows - 1);
  var ci0 = Math.floor(ci), ci1 = Math.min(ci0 + 1, t.cols - 1);
  var ri0 = Math.floor(ri), ri1 = Math.min(ri0 + 1, t.rows - 1);
  if (ri0 < 0 || ri0 >= t.rows || ci0 < 0 || ci0 >= t.cols) return 0;
  var fx = ci - ci0, fz = ri - ri0;
  var h00 = t.grid[ri0][ci0], h10 = t.grid[ri0][ci1];
  var h01 = t.grid[ri1][ci0], h11 = t.grid[ri1][ci1];
  return Math.max(0, (h00 + (h10-h00)*fx + ((h01 + (h11-h01)*fx) - (h00 + (h10-h00)*fx)) * fz) - t.min_elev);
}

fetch('map3d.json').then(function(r) { return r.json(); }).then(function(data) {
  loading.style.display = 'none';
  var t = data.terrain;
  var cx = (t.x0 + t.x1) / 2, cz = (t.z0 + t.z1) / 2;
  var sx = t.x1 - t.x0, sz = t.z1 - t.z0;
  var maxD = Math.max(sx, sz);

  // Satellite crop: 2891x2916 out of 4096x4096
  var uMax = 2891 / 4096;
  var vMax = 2916 / 4096;
  // BBOX in local metres
  var bx0 = -961.0, bx1 = 1025.0;
  var bz0 = -891.0, bz1 = 1113.0;

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x334466);
  scene.fog = new THREE.Fog(0x334466, maxD * 1.2, maxD * 2.0);

  var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, maxD * 4);
  camera.position.set(cx, maxD * 0.4, cz + maxD * 0.8);

  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  var controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.maxPolarAngle = Math.PI / 2.15;
  controls.minDistance = 5;
  controls.maxDistance = maxD * 2;
  controls.target.set(cx, 0, cz);
  controls.update();

  var texLoader = new THREE.TextureLoader();
  var satTex = texLoader.load('satellite.png');
  satTex.wrapS = satTex.wrapT = THREE.ClampToEdgeWrapping;
  satTex.colorSpace = THREE.SRGBColorSpace;

  // Terrain with corrected UVs
  if (t.grid && t.grid.length) {
    var geo = new THREE.PlaneGeometry(sx, sz, t.cols - 1, t.rows - 1);
    geo.rotateX(-Math.PI / 2);
    var pos = geo.attributes.position;
    var uvs = new Float32Array(pos.count * 2);

    for (var i = 0; i < pos.count; i++) {
      var wx = pos.getX(i) + cx, wz = pos.getZ(i) + cz;
      pos.setY(i, getTerrainHeight(wx, wz, t));
      // Map to satellite crop UVs
      var uf = (wx - bx0) / (bx1 - bx0);
      var vf = (wz - bz0) / (bz1 - bz0);
      uvs[i*2]   = uf * uMax;
      uvs[i*2+1] = vf * vMax;
    }
    pos.needsUpdate = true;
    geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    geo.computeVertexNormals();

    var tMat = new THREE.MeshStandardMaterial({ map: satTex, roughness: 0.8, metalness: 0.0 });
    var tMesh = new THREE.Mesh(geo, tMat);
    tMesh.position.set(cx, 0, cz);
    tMesh.receiveShadow = true;
    scene.add(tMesh);
  }

  // Buildings with satellite roof colors
  var bMat = new THREE.MeshStandardMaterial({ roughness: 0.7, metalness: 0.05 });
  data.buildings.forEach(function(b) {
    var col = b.color || [180, 160, 140];
    var geo = new THREE.BoxGeometry(b.w, b.h, b.d);
    var mat = bMat.clone();
    mat.color.setRGB(col[0]/255 * 0.7, col[1]/255 * 0.7, col[2]/255 * 0.7);
    var mesh = new THREE.Mesh(geo, mat);
    var th = getTerrainHeight(b.x, b.z, t);
    mesh.position.set(b.x, th + b.h / 2, b.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
  });

  // Roads
  var rMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.9 });
  data.roads.forEach(function(pts) {
    for (var i = 0; i < pts.length - 1; i++) {
      var x1 = pts[i][0], z1 = pts[i][1];
      var x2 = pts[i+1][0], z2 = pts[i+1][1];
      var dx = x2 - x1, dz = z2 - z1;
      var len = Math.sqrt(dx * dx + dz * dz);
      if (len < 0.5) continue;
      var seg = new THREE.Mesh(new THREE.PlaneGeometry(len, 4), rMat);
      seg.rotation.x = -Math.PI / 2;
      var ry = (getTerrainHeight(x1, z1, t) + getTerrainHeight(x2, z2, t)) / 2;
      seg.position.set((x1 + x2) / 2, Math.max(0.1, ry + 0.1), (z1 + z2) / 2);
      seg.lookAt(x2, ry + 0.1, z2);
      seg.receiveShadow = true;
      scene.add(seg);
    }
  });

  // Lighting
  scene.add(new THREE.AmbientLight(0x8899bb, 0.5));
  var sun = new THREE.DirectionalLight(0xffeedd, 2.0);
  sun.position.set(cx + maxD * 0.4, maxD * 0.6, cz + maxD * 0.3);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 4096;
  sun.shadow.mapSize.height = 4096;
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = maxD * 2;
  sun.shadow.camera.left = -maxD;
  sun.shadow.camera.right = maxD;
  sun.shadow.camera.top = maxD;
  sun.shadow.camera.bottom = -maxD;
  scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x87CEEB, 0x5B8C3E, 0.7));

  statsEl.textContent = data.stats.buildings + ' buildings · ' + data.stats.roads + ' roads · satellite terrain';

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
}).catch(function(err) { loading.textContent = 'Error: ' + err.message; });
</script>
</body>
</html>
